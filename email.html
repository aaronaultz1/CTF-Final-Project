<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Northstar Logistics Mail</title>

    <link rel="stylesheet" href="css/email.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo">

            ★ Northstar Logistics Mail

        </div>

        <div class="user-info">

            Logged in as:
            <span id="loggedInUser"></span>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <div class="container">

        <!-- LEFT SIDEBAR -->

        <aside>

            <button id="composeBtn" class="composeButton">
                ✉ Compose
            </button>

            <nav>

                <button id="inboxBtn" class="menuButton">
                    📥 Inbox
                </button>

                <button id="sentBtn" class="menuButton">
                    📤 Sent
                </button>

                <button id="dashboardBtn" class="menuButton">
                    🏠 Dashboard
                </button>

            </nav>

        </aside>

        <!-- EMAIL LIST -->

        <section class="emailList">

            <h2>Inbox</h2>

            <div id="emailContainer">

                <!-- Emails are generated by JavaScript -->

            </div>

        </section>

        <!-- EMAIL VIEWER -->

        <section class="emailViewer">

            <h2 id="emailSubject">

                Select an email

            </h2>

            <p>

                <strong>From:</strong>

                <span id="emailFrom"></span>

            </p>

            <hr>

            <div id="emailBody">

                Click an email on the left to read it.

            </div>

            <br>

            <button
                id="replyButton"
                class="replyButton"
                style="display:none;">

                Reply

            </button>

        </section>

    </div>

    <!-- ================= COMPOSE MODAL ================= -->

    <div
        id="composeModal"
        class="modal">

        <div class="modalContent">

            <span
                class="closeButton"
                id="closeCompose">

                &times;

            </span>

            <h2>

                Compose Email

            </h2>

            <label>

                To

            </label>

            <input
                type="text"
                id="composeTo"
                placeholder="recipient@northstar.local">

            <label>

                Subject

            </label>

            <input
                type="text"
                id="composeSubject">

            <label>

                Message

            </label>

            <textarea
                id="composeBody"
                rows="12"></textarea>

            <button id="sendButton">

                Send

            </button>

        </div>

    </div>

    <!-- ================= REPLY MODAL ================= -->

    <div
        id="replyModal"
        class="modal">

        <div class="modalContent">

            <span
                class="closeButton"
                id="closeReply">

                &times;

            </span>

            <h2>

                Reply

            </h2>

            <textarea
                id="replyText"
                rows="10"></textarea>

            <button id="replySendButton">

                Send Reply

            </button>

        </div>

    </div>

    <script src="js/email.js"></script>

</body>

</html>
