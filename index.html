<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Northstar Logistics | Employee Portal</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

    <h1>Northstar Logistics</h1>

    <p class="subtitle">
        Employee Access Portal
    </p>

    <form id="loginForm">

        <label>Username</label>

        <input
            type="text"
            id="username"
            placeholder="Enter username"
            required>

        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Enter password"
            required>

        <button type="submit">
            Sign In
        </button>

    </form>

    <p id="errorMessage"></p>

</div>

<footer>

    © 2026 Northstar Logistics<br>

    Internal Employee Portal v2.4

</footer>

<script src="js/login.js"></script>

</body>
</html>
